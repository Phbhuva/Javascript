<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATORS</title>
</head>
<body>
    <!-- (1) Arithmetic operators -->
    <script>
        let a=50;
        let b=48;
        document.write('A is addition ',(a+b));
        document.write('<br> B is minas ',(a-b));
        document.write('<br> C is multiply ',(a*b));
        document.write('<br> D is Division ',(a/b));
        document.write('<br> E is Modulus ',(a%b));

        let c=22;
        document.write('<br> Exponent',(c**2)); 
        
        let bp=22;
        let cp=bp++
                     
        document.write('<br> hp is increment ',(cp));
        document.write('<br> hp is increment ',(bp));

        let dp=22;
        let jp=dp--
        document.write('<br> hp is Prefix ',(jp));
        document.write('<br> hp is Prefix ',(dp));    
        
        
    </script>

    <!-- -- (2) Assignment operators -->
    <script>
            var bh=30;
            var hb=20;
            bh+hb    
            document.write('<br><br> Same operators is  '+bh);   
            bh-=hb
            document.write('<br> sec as-operators is'+(bh));
            bh*=hb
            document.write('<br> third operators is '+(bh));  
            bh/=hb
            document.write('<br> fourth operators is '+(bh));
            bh%=hb
            document.write('<br> fiveth operators is '+(bh)); 
            bh**=hb
            document.write('<br> six operators is '+(bh)); 
    </script>
    <!-- (3) Comparison operators -->
    <script>
            let gj=101;
            let jg=100;
            let cg=96;

            document.write('<br> <br>This is equal '+(gj===cg));
            document.write('<br> <br>This is equal value and type '+(gj==jg));
            document.write('<br> <br>This is not equal '+(gj!=jg));       
            document.write('<br> <br>This is not equal value and not type '+(gj!==jg)); 
            document.write('<br> <br>This is greathen '+(gj>jg));
            document.write('<br> <br>This is greathen '+(gj>=jg));       
            document.write('<br> <br>This is lessthen '+(gj<jg));    
            document.write('<br> <br>This is lessthen '+(gj<=jg));  

    </script>
    <!-- (4) Logical operators  -->
    <script>
        let kp=36;
        let lp=360;
        document.write('<br> <br> kp and lp ',(kp && lp ));   
        document.write('<br> <br> kp or lp ',(kp || lp ));  
        document.write('<br> <br> kp not lp ',!(kp > lp ));      
    </script>
</body>
</html>
