    <script>
        // 4. WAP to IndexOf function, Shift and unshift function
        let ab=[12,28,34,45,53];
          
        document.write('<br> this is indexof '+ab.indexOf(34));
        
        ab.shift();
        for(let i=0;i<ab.length;i++){
            document.write('<br><hr><br> this is array '+ab[i]);   
        }
        ab.unshift(35000);
        for(let i=0;i<ab.length;i++){
            document.write('<br><hr><br> this is array '+ab[i]);   
        }
        
    </script><hr>
