            getvelue();

        function mult(){

        getvelue();

        sum=Number(a)*Number(b);

        function div(){

        getvelue();

    <br>
         <button class="button-71" role="button"  onclick="cb()">Rectanlge</button>
         <p id="rg" class="re">Result</p>

         <script>
                function cv(t1 , t2 ,t3){
                    q = document.getElementById('t1').value;
                    w = document.getElementById('t2').value;
                    e = document.getElementById('t3').value;

                }
                let cn=(q+w+e)/2;
                
                function cb(){

                   let areaValue = Math.sqrt(cn * (cn - q) * (cn - w) * (cn - e));

                  document.getElementById('rg').innerHTML =  q+"*/"+w+"*/"+e+""+areaValue;

                }
