    <!-- 1 character and check whether it is alphabet, digit or special character. -->
    <script>
            let cha=parseInt(prompt('that is character'));
            if((cha>='a' && cha<='z') || (cha>='A' && cha<='Z') ){

                document.write('<h2>this is alphabet <h2>');
                
            }else if(cha>='0' && cha<='99'){
                document.write('<h2> this is digit </h2>');
                
            }else{
                document.write('<h2> this is no special chracter.... </h2>');             
            }
    </script>

    <!-- 2 check a number is even or odd using ternary operator.-->
    <script>
            let ad=parseInt(prompt('First number'));
            
             (ad%2 == 0)?document.write('<h2>this num is even '): document.write('<h2>this num is odd ');

    </script>

    <!--3 program use switch statement. Display Monday to Sunday. -->
    <script>
            ch=(prompt('enter this day '));

            switch(ch){

                case 'm':
                        document.write('<h2>TODAY IS MONDAY<h2>');
                        break;
                case 't':
                        document.write('<h2>TODAY IS TUESDAY<h2>');
                        break;
                case 'w':
                        document.write('<h2>TODAY IS WEDNESDAY<h2>');
                        break;   
                case 'th':
                        document.write('<h2>TODAY IS THURSDAY<h2>');
                        break;    
                case 'F':
                        document.write('<h2>TODAY IS FRIDAY<h2>');
                        break; 
                case 's':
                        document.write('<h2>TODAY IS SATURDAY<h2>');
                        break; 
                case 'su':
                        document.write('<h2>TODAY IS SUNDAY<h2>');
                        break;                    
            }
    </script>

    <!-- 8).  write program to check if salary is -->
    <script>
            let salary=parseInt(prompt('Our salary'));
            if(salary>=1000  && salary<5000){
                        salary+=1000; //salary = salary+1000
            }else if(salary>=5000 && salary<10000){
                        salary+=2000;
            }else if(salary>=10000 && salary<20000){
                        salary+=3000;
            }else if(salary>=20000 && salary<50000){
                         salary+=4000;

            }else{
             document.write('<h2> no increment </h2>');
            }
            document.write('<h2> final salary '+salary);
    </script>

    <!--5) .  electricity unit charges and calculate total electricity bill according to the given condition:  -->

    <script>
            let unit=parseInt(prompt('enter your bill'));
            // let=bill;

            if(unit>=50){
                bill=unit+0.50;
   
            }else if(unit>=51  && unit<=150){
                bill=25+(unit-50)*0.75;
            }else if(unit>=151  && unit<=250){
                bill=75+(unit-100)*1.20;
            }else {
                bill=120+(unit-250)*1.50;
            }
            sur=bill*20/100;
            final=sur+bill;
            
            document.write('this is your bill'+final);
            
    </script>
